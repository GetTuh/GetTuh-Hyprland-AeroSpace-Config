# For window rules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# This file is used to add or overwrite window rules
# This file will not be modified during dotfiles updates


# Layer rules now belong in UserConfigs/LayerRules.conf

# Force full opacity on every window. Sourced after configs/WindowRules.conf,
# which has a bunch of per-tag/per-class opacity rules (browser, terminal,
# file-manager, PiP, wallpaper picker, etc.) -- this catch-all matches every
# window and, coming later, wins for all of them.
windowrule = match:class .*, opacity 1.0 1.0
