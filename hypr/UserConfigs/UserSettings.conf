# User Settings

# Hyprland Wiki Links
# Input - https://wiki.hyprland.org/Configuring/Variables/#input

input {
  accel_profile = flat # disable mouse acceleration
}

# Start KWallet so apps using the Secret Service API (e.g. Brave sync) can
# find a keyring outside of a KDE session
exec-once = kwalletd6
