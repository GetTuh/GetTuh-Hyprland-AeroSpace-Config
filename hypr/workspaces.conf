# You can set workspace rules to achieve workspace-specific behaviors.
# For instance, you can define a workspace where all windows are drawn without borders or gaps.

# https://wiki.hyprland.org/Configuring/Workspace-Rules/

# 3 workspaces per monitor:
# DP-1     = AOC Q27G41ZDF, 1440p 240Hz OLED (primary)
# HDMI-A-1 = Dell P2423DE, 1440p 60Hz, rotated vertical
# eDP-1    = laptop panel, when docked/undocked (no-op if not present)
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:HDMI-A-1, default:true
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:eDP-1, default:true
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
